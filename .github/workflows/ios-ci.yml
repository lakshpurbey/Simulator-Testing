name: Scalable iOS + macOS Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        platform: [iphone, ipad, macos]
        device_group: [small, medium, large]
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - name: Set Device
        run: |
          if [ "${{ matrix.platform }}" == "iphone" ]; then
            if [ "${{ matrix.device_group }}" == "small" ]; then
              echo "DEST=platform=iOS Simulator,name=iPhone SE (3rd generation)" >> $GITHUB_ENV
            elif [ "${{ matrix.device_group }}" == "medium" ]; then
              echo "DEST=platform=iOS Simulator,name=iPhone 15" >> $GITHUB_ENV
            else
              echo "DEST=platform=iOS Simulator,name=iPhone 15 Pro Max" >> $GITHUB_ENV
            fi
          elif [ "${{ matrix.platform }}" == "ipad" ]; then
            echo "DEST=platform=iOS Simulator,name=iPad Pro (12.9-inch)" >> $GITHUB_ENV
          else
            echo "DEST=platform=macOS" >> $GITHUB_ENV
          fi

      - name: Select Test Shard
        run: |
          if [ "${{ matrix.shard }}" == "1" ]; then
            echo "TESTS=LoginTests" >> $GITHUB_ENV
          elif [ "${{ matrix.shard }}" == "2" ]; then
            echo "TESTS=PaymentTests" >> $GITHUB_ENV
          elif [ "${{ matrix.shard }}" == "3" ]; then
            echo "TESTS=ProfileTests" >> $GITHUB_ENV
          else
            echo "TESTS=SettingsTests" >> $GITHUB_ENV
          fi

      - name: Run Tests
        run: |
          xcodebuild test \
          -scheme "Simulator-Testing" \
          -destination "$DEST" \
          -parallel-testing-enabled YES \
          -parallel-testing-worker-count 2 \
          -only-testing:$TESTS
