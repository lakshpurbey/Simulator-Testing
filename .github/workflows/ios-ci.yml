name: iOS UI + Unit Tests (Parallel)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        device: ["iPhone 14", "iPhone 15", "iPad Pro (12.9-inch)"]
        shard: [1, 2]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.swift') }}

      # Dynamic Test Sharding
      - name: Select Test Shard
        id: shard
        run: |
          if [ "${{ matrix.shard }}" == "1" ]; then
            echo "TESTS=Simulator_TestingUITests/LoginUITests" >> $GITHUB_ENV
          else
            echo "TESTS=Simulator_TestingTests" >> $GITHUB_ENV
          fi

      - name: Run Tests (Parallel)
        run: |
          xcodebuild test \
          -scheme "Simulator-Testing" \
          -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
          -parallel-testing-enabled YES \
          -parallel-testing-worker-count 2 \
          -only-testing:$TESTS \
          | xcpretty
