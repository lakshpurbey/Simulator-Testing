name: iOS + macOS Parallel Tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        platform: [iphone, ipad, macos]
        shard: [1, 2]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.swift') }}

      # Platform-based destination
      - name: Set Destination
        run: |
          if [ "${{ matrix.platform }}" == "iphone" ]; then
            echo "DEST=platform=iOS Simulator,name=iPhone 15" >> $GITHUB_ENV
          elif [ "${{ matrix.platform }}" == "ipad" ]; then
            echo "DEST=platform=iOS Simulator,name=iPad Pro (12.9-inch)" >> $GITHUB_ENV
          else
            echo "DEST=platform=macOS" >> $GITHUB_ENV
          fi

      # Test Sharding
      - name: Select Test Shard
        run: |
          if [ "${{ matrix.shard }}" == "1" ]; then
            echo "TESTS=Simulator_TestingUITests/LoginUITests" >> $GITHUB_ENV
          else
            echo "TESTS=Simulator_TestingTests" >> $GITHUB_ENV
          fi

      - name: Run Tests (Parallel)
        run: |
          xcodebuild test \
          -scheme "Simulator-Testing" \
          -destination "$DEST" \
          -parallel-testing-enabled YES \
          -parallel-testing-worker-count 2 \
          -only-testing:$TESTS \
          | xcpretty
