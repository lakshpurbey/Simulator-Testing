name: iOS + macOS Parallel Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        platform: [iPhone, iPad, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run Tests
        run: |
          if [ "${{ matrix.platform }}" == "iPhone" ]; then
            DEST="platform=iOS Simulator,name=iPhone 15"
          elif [ "${{ matrix.platform }}" == "iPad" ]; then
            DEST="platform=iOS Simulator,name=iPad Pro (12.9-inch)"
          else
            DEST="platform=macOS"
          fi

          xcodebuild test \
          -scheme "Simulator-Testing" \
          -destination "$DEST" \
          -parallel-testing-enabled YES \
          -parallel-testing-worker-count 2
